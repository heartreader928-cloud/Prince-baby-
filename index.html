<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Card</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
  color:white;
  overflow:hidden;
  background: linear-gradient(135deg, #1a0033, #330033, #660033);
}

.page {
  display:none;
  height:100vh;
  width:100%;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
  padding:20px;
  position:relative;
}
.active { display:flex; }

button {
  padding:12px 20px;
  margin:10px;
  border:none;
  border-radius:10px;
  font-size:16px;
  cursor:pointer;
  position:relative;
}

/* ⭐ STARS */
.star {
  position:absolute;
  font-size:10px;
  opacity:0.5;
}

/* ❤️ HEART FALL */
.heart {
  position:absolute;
  font-size:18px;
  animation: fall linear forwards;
  filter: drop-shadow(0 0 6px pink);
}
@keyframes fall {
  0% { transform: translateY(-100vh); }
  100% { transform: translateY(80vh); }
}

/* ❤️ FIXED HEART */
.fixed-heart {
  position:absolute;
  bottom:0;
  font-size:16px;
  animation: glow 1.5s infinite alternate;
}
@keyframes glow {
  0% { filter: drop-shadow(0 0 5px pink); }
  100% { filter: drop-shadow(0 0 15px red); }
}

/* 💥 BURST */
.particle {
  position:absolute;
  font-size:12px;
  animation: burst 1s forwards;
}
@keyframes burst {
  0% { opacity:1; }
  100% {
    transform: translate(var(--x), var(--y));
    opacity:0;
  }
}
</style>
</head>

<body>

<!-- PAGE 1 -->
<div class="page active" id="p1">
  <h2 id="t1"></h2>
  <p id="t2"></p>
  <button onclick="nextPage(2)">Next</button>
</div>

<!-- PAGE 2 -->
<div class="page" id="p2">
  <h3 id="t3"></h3>
  <p>Kaisa laga mere saath rehkr?</p>
  <button onclick="wrong()">Accha</button>
  <button onclick="wrong()">Bohot bekar</button>
  <button onclick="wrong()">Best</button>
  <button onclick="nextPage(3)">I can't express ❤️</button>
</div>

<!-- PAGE 3 -->
<div class="page" id="p3">
  <h3>Gift chahiye?? 🎁</h3>
  <button id="yes" onclick="tapYes()">YES</button>
  <button id="no">NO</button>
</div>

<!-- PAGE 4 -->
<div class="page" id="p4">
  <h2 id="t4"></h2>
  <p id="t5"></p>
  <button onclick="nextPage(5)">Next</button>
</div>

<!-- PAGE 5 -->
<div class="page" id="p5">
  <h2 id="t6"></h2>
</div>

<script>

/* PAGE SWITCH */
function nextPage(n){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('p'+n).classList.add('active');
  runTyping(n);
}

/* TYPING */
function type(el,text,speed=30){
  el.innerHTML="";
  let i=0;
  function t(){
    if(i<text.length){
      el.innerHTML+=text[i++];
      setTimeout(t,speed);
    }
  }
  t();
}

function runTyping(p){
  if(p==1){
    type(t1,"Hello it's your best friend Sameer 🎁");
    setTimeout(()=>type(t2,"A small gift for u"),1000);
  }
  if(p==2){
    type(t3,"Sorry bro birthday ke din kuch diya nahi 😅");
  }
  if(p==4){
    type(t4,"🎉 Happy Birthday Prince 🎉");
    type(t5,"Mera bhai hai tu 🤭...");
  }
  if(p==5){
    type(t6,"THANK YOU ❤️");
  }
}
runTyping(1);

/* YES BUTTON GROW */
let taps=0;
function tapYes(){
  taps++;
  yes.style.transform=`scale(${1+taps})`;

  if(taps>=4){
    yes.style.position="fixed";
    yes.style.top="0";
    yes.style.left="0";
    yes.style.width="100vw";
    yes.style.height="100vh";
    yes.style.fontSize="40px";

    setTimeout(()=>nextPage(4),800);
  }
}

/* NO BUTTON RUN AWAY */
let noBtn=document.getElementById("no");

noBtn.addEventListener("click",()=>{
  moveNo();
});

noBtn.addEventListener("mouseover",()=>{
  moveNo();
});

function moveNo(){
  let x=Math.random()*80;
  let y=Math.random()*80;
  noBtn.style.position="absolute";
  noBtn.style.left=x+"%";
  noBtn.style.top=y+"%";
}

/* FUN ALERT */
function wrong(){
  alert("Sach bol 😏");
}

/* ⭐ STARS */
for(let i=0;i<40;i++){
  let s=document.createElement("div");
  s.className="star";
  s.innerHTML="⭐";
  s.style.left=Math.random()*100+"%";
  s.style.top=Math.random()*100+"%";
  document.body.appendChild(s);
}

</script>

</body>
  </html>
